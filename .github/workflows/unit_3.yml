name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: npm install

      - name: Run validation
        run: npm run validate # Replace with a validation command

  build:
    runs-on: ubuntu-latest
    needs: validate       # This ensures build runs after validation
    if: success()        # This ensures build runs only if validate was successful
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build project
        run: npm run build # Replace with a build command
